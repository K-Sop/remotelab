<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Receiver v0.3</title><style>body{font-family:Arial;padding:20px}.card{border:1px solid #ccc;margin:10px;padding:10px}.bg{background:#ddd;height:24px}.fill{background:#2196f3;height:24px;width:0%}</style></head><body><h1>RemoteLab Receiver v0.3</h1><p>※現版は同一ブラウザ検証用。次版でLAN通信へ移行。</p><div id="out"></div><script>const groups=['G1','G2','G3','G4'];function draw(){out.innerHTML='';groups.forEach(g=>{const data=JSON.parse(localStorage.getItem('remotelab_'+g)||'{"level":0}');const d=document.createElement('div');d.className='card';d.innerHTML='<h3>'+g+'</h3><div class="bg"><div class="fill" style="width:'+Math.min(data.level||0,100)+'%"></div></div><p>音量:'+ (data.level||0) +'</p>';out.appendChild(d);});}setInterval(draw,200);draw();</script></body></html>
