<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Receiver WebRTC</title></head><body><h2>受信校PC</h2><p>①iPadのコードを貼付→②受信開始→③応答コードをiPadへ返す</p><textarea id="offer" rows="12" cols="80"></textarea><br><button id="start">受信開始</button><br><textarea id="answer" rows="12" cols="80"></textarea><br><video id="v" autoplay playsinline width="640"></video><script>let pc;start.onclick=async()=>{pc=new RTCPeerConnection();pc.ontrack=e=>v.srcObject=e.streams[0];await pc.setRemoteDescription(JSON.parse(offer.value));const ans=await pc.createAnswer();await pc.setLocalDescription(ans);pc.onicecandidate=()=>{if(pc.iceGatheringState==='complete')answer.value=JSON.stringify(pc.localDescription)};};</script></body></html>
