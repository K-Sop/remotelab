<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Student WebRTC</title></head><body><h2>iPad送信側</h2><button id="start">接続コード作成</button><p>①開始→②表示されたコードをPCへ貼付</p><textarea id="offer" rows="12" cols="80"></textarea><br><textarea id="answer" rows="12" cols="80" placeholder="PC側の応答コード"></textarea><br><button id="connect">応答コード設定</button><video id="v" autoplay muted playsinline width="320"></video><script>let pc;start.onclick=async()=>{pc=new RTCPeerConnection();const st=await navigator.mediaDevices.getUserMedia({video:true,audio:false});v.srcObject=st;st.getTracks().forEach(t=>pc.addTrack(t,st));pc.onicecandidate=()=>{if(pc.iceGatheringState==='complete')offer.value=JSON.stringify(pc.localDescription)};await pc.setLocalDescription(await pc.createOffer());};connect.onclick=async()=>{await pc.setRemoteDescription(JSON.parse(answer.value));alert('接続完了');};</script></body></html>
