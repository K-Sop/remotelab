<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RemoteLab Camera Test</title>
<style>
body{font-family:Arial,sans-serif;max-width:800px;margin:20px auto;padding:20px}
button{font-size:1.2rem;padding:12px 24px}
video{width:100%;max-width:700px;background:#000;border-radius:8px;margin-top:12px}
#status{margin-top:12px;padding:10px;background:#eef}
</style>
</head>
<body>
<h1>RemoteLab カメラ・マイク テスト</h1>
<p>iPadで開き、「開始」を押してください。</p>
<button id="start">開始</button>
<div id="status">待機中</div>
<video id="video" autoplay playsinline muted></video>
<script>
document.getElementById('start').addEventListener('click', async ()=>{
 const status=document.getElementById('status');
 try{
   status.textContent='カメラ・マイク取得中...';
   const stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
   document.getElementById('video').srcObject=stream;
   status.textContent='成功: カメラ・マイク取得完了';
 }catch(e){
   status.textContent='失敗: '+e.name+' / '+e.message;
 }
});
</script>
</body>
</html>
