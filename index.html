<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Student v0.3</title><style>body{font-family:Arial;padding:20px}button,input{font-size:18px}#bar{height:24px;background:#4caf50;width:0%}</style></head><body><h1>Student v0.3</h1><label>グループ名 <input id="group" value="G1"></label><button id="start">開始</button><p id="status">待機中</p><div style="background:#ddd"><div id="bar"></div></div><script>document.getElementById('start').onclick=async()=>{const stream=await navigator.mediaDevices.getUserMedia({audio:true});status.textContent='音量測定中';const ctx=new AudioContext();const src=ctx.createMediaStreamSource(stream);const an=ctx.createAnalyser();src.connect(an);const data=new Uint8Array(an.frequencyBinCount);function loop(){an.getByteFrequencyData(data);let level=Math.round(data.reduce((a,b)=>a+b,0)/data.length);bar.style.width=Math.min(level,100)+'%';localStorage.setItem('remotelab_'+group.value,JSON.stringify({group:group.value,level:level,time:Date.now()}));requestAnimationFrame(loop);}loop();};</script></body></html>
